spring:
  application:
    name: prism-backend
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:mysql://localhost:3306/prism?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-max

server:
  port: 8080

github:
  token: ${GITHUB_TOKEN}
  client-id: ${GITHUB_CLIENT_ID}
  client-secret: ${GITHUB_CLIENT_SECRET}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      # 全局逻辑删除配置：deleted 字段，1-已删除，0-未删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:prism-jwt-secret-key-for-development-only-change-in-production}
  expiration: 86400000

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
  override-with-generic-response: false

knife4j:
  enable: true
  setting:
    language: zh_cn
